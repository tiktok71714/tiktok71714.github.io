<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>父亲节快乐</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑",sans-serif;
        }
        body{
            min-height: 100vh;
            /* 线上环境替换为网络背景图，无需本地图片 */
            background: url("https://img0.baidu.com/it/u=3289712232,3082031225&fm=253&fmt=auto&app=138&f=JPEG?w=1920&h=1080") no-repeat center center;
            background-size: cover;
            background-color: rgba(0,0,0,0.6);
            background-blend-mode: multiply;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }
        /* 爱心飘落动画 */
        .heart{
            position: fixed;
            color: #ff6b6b;
            font-size: 24px;
            animation: fall linear infinite;
            opacity: 0.7;
            pointer-events: none;
        }
        @keyframes fall{
            0%{
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100%{
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        .title{
            font-size: 48px;
            text-align: center;
            text-shadow: 0 0 15px #ffd700;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow{
            from{text-shadow: 0 0 10px #ffd700;}
            to{text-shadow: 0 0 30px #ffd700,0 0 50px #ff9800;}
        }
        .text-box{
            width: 90%;
            max-width: 600px;
            background: rgba(0,0,0,0.35);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.4);
            backdrop-filter: blur(8px);
        }
        .bless{
            font-size: 20px;
            line-height: 2;
            text-align: center;
            margin: 12px 0;
        }
        .end{
            margin-top: 40px;
            font-size: 18px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <h1 class="title">父亲节快乐</h1>
    <div class="text-box">
        <p class="bless">
            老爹父亲节快乐哦<br>
            不知道你缺啥就没买礼物了 又感觉送花怪怪的 索性写点祝福语
        </p >
        <p class="bless">
            祝你接下来身体健康不受伤<br>
            事业顺利少生气<br>
            吃得多吃得好睡得多睡得香
        </p>
        <p class="end">永远爱您❤️</p >
    </div>
    <script>
        // 自动生成飘落爱心
        function createHeart(){
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '♥';
            // 随机位置、大小、下落速度
            heart.style.left = Math.random()*100 + 'vw';
            heart.style.fontSize = Math.random()*20+15+'px';
            heart.style.animationDuration = Math.random()*5+3+'s';
            document.body.appendChild(heart);
            // 爱心落地后删除
            setTimeout(()=>heart.remove(),8000);
        }
        // 每300ms生成一个爱心
        setInterval(createHeart,300);
    </script>
</body>
</html>
